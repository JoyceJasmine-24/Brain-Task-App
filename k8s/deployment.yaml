apiVersion: apps/v1
kind: Deployment

metadata:
  name: brain-tasks

spec:
  replicas: 1

  selector:
    matchLabels:
      app: brain-tasks

  template:
    metadata:
      labels:
        app: brain-tasks

    spec:
      containers:
      - name: brain-tasks
        image: 145689194017.dkr.ecr.ap-south-1.amazonaws.com/brain-tasks-app:latest
        ports:
        - containerPort: 80